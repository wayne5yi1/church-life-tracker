<html lang="zh">

    <title>聖徒屬靈追求與召會生活實行追蹤</title>

    <!-- 💡 引入現代 Bootstrap 5 框架，讓畫面從「作業感」躍升為「正式網站」 -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 🔥 Firebase：用來做帳號登入 + 雲端資料庫，讓資料能跨裝置同步 -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script>
        // ⚠️ 請將以下設定換成你自己 Firebase 專案的設定值（步驟見交談中的說明）
        const firebaseConfig = {
            apiKey: "AIzaSyARszpc7JCoc-bLk9vIgJVFYhgeuhumBnw",
            authDomain: "church-life-tracker.firebaseapp.com",
            projectId: "church-life-tracker",
            storageBucket: "church-life-tracker.firebasestorage.app",
            messagingSenderId: "838242346420",
            appId: "1:838242346420:web:9eafdbf90f2afdd3a0bee1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        // 帳號登入時，會把使用者輸入的「帳號」自動接上這個假網域，組成 Firebase 需要的 email 格式
        const FAKE_EMAIL_DOMAIN = "@church-tracker.local";
    </script>

    <style>
        body { background-color: #f4f6f9; font-family: system-ui, -apple-system, sans-serif; }
        .main-card { max-width: 950px; margin: 40px auto; border: none; }
        .table th { background-color: #212529; color: white; vertical-align: middle; }
        .meeting-badge { font-size: 0.8rem; margin-right: 3px; display: inline-block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <!-- 🔐 登入畫面：登入成功前，看不到任何追蹤資料 -->
    <div class="container" id="login-container">
        <div class="card main-card shadow-sm rounded-3 overflow-hidden" style="max-width: 400px;">
            <div class="card-header bg-dark text-white py-3">
                <h5 class="mb-0 fw-bold">🔐 登入</h5>
            </div>
            <div class="card-body p-4 bg-white">
                <p class="text-muted small">第一次使用嗎？直接輸入想要的帳號密碼按「登入」，系統會自動幫你建立帳號。</p>
                <div class="mb-3">
                    <label class="form-label small fw-bold">帳號</label>
                    <input type="text" id="login_username" class="form-control" placeholder="自訂一組帳號名稱" autocomplete="username">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">密碼</label>
                    <input type="password" id="login_password" class="form-control" placeholder="至少 6 個字元" autocomplete="current-password">
                </div>
                <div id="login_error" class="text-danger small mb-2" style="display:none;"></div>
                <button class="btn btn-dark w-100 fw-bold" onclick="handleLogin()" id="login_btn">登入</button>
            </div>
        </div>
    </div>

    <div class="container" id="app-container" style="display:none;">
        <div class="d-flex justify-content-end mb-2" style="max-width: 950px; margin: 0 auto;">
            <span class="small text-muted me-3 align-self-center" id="current-user-label"></span>
            <button class="btn btn-sm btn-outline-secondary" onclick="handleLogout()">登出</button>
        </div>
        <div class="card main-card shadow-sm rounded-3 overflow-hidden">
            <div class="card-header bg-dark text-white py-3">
                <h4 class="mb-0 fw-bold">📊 聖徒「神命定之路」召會生活實行動態追蹤系統</h4>
            </div>
            <div class="card-body p-4 bg-white">
                
                <!-- 核心動態表格  -->
                <div class="table-responsive">
                    <table id="X" class="table table-hover table-bordered align-middle text-center mb-4">
                        <thead>
                            <tr>
                                <th style="width: 15%;">聖徒姓名</th>
                                <th style="width: 25%;">真理追求進度 </th>
                                <th style="width: 45%;">召會生活實行紀錄 </th>
                                <th style="width: 15%;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 預設聖徒 1：王阿花 -->
                            <tr id="row1">
                                <td id="name_row1" class="fw-bold">EX：王阿花</td>
                                <td id="country_row1">創世紀生命讀經第1章</td>
                                <td id="sex_row1" class="text-start p-3">
                                    <div class="mb-1">
                                        <span class="badge bg-success meeting-badge" id="pray_tag1">🙏 週二禱告</span>
                                        <span class="badge bg-success meeting-badge" id="group_tag1">🏡 週五小排</span>
                                        <span class="badge bg-success meeting-badge" id="lord_tag1">🍞 主日聚會</span>
                                    </div>
                                    <div class="small text-muted mb-1">
                                        📢 <b>傳福音：</b><span id="gospel_1" class="text-primary fw-bold">有 (每週六下午兩點)</span>
                                    </div>
                                    <div class="small text-muted">
                                        ✨ <b>額外分別的情形：</b><span id="extra_1">每日清晨與活力伴晨興 10 分鐘</span>
                                    </div>
                                </td>
                                <td>
                                    <input type="button" class="btn btn-sm btn-outline-primary mb-1 w-100" id="edit_button1" value="編輯" onclick="edit_row('1')">
                                    <input type="button" class="btn btn-sm btn-success mb-1 w-100" id="save_button1" value="儲存" style="display:none" onclick="save_row('1')">
                                    <input type="button" class="btn btn-sm btn-outline-danger w-100" value="刪除" onclick="delete_row('1')">
                                </td>
                            </tr>
                            <!-- 預設聖徒 2：陳大頭 -->
                            <tr id="row2">
                                <td id="name_row2" class="fw-bold">EX：陳大頭</td>
                                <td id="country_row2">精讀羅馬書核心真理</td>
                                <td id="sex_row2" class="text-start p-3">
                                    <div class="mb-1">
                                        <span class="badge bg-secondary meeting-badge" id="pray_tag2">✕ 週二禱告</span>
                                        <span class="badge bg-success meeting-badge" id="group_tag2">🏡 週五小排</span>
                                        <span class="badge bg-success meeting-badge" id="lord_tag2">🍞 主日聚會</span>
                                    </div>
                                    <div class="small text-muted mb-1">
                                        📢 <b>傳福音：</b><span id="gospel_2" class="text-danger">沒有分別時間</span>
                                    </div>
                                    <div class="small text-muted">
                                        ✨ <b>額外分別的情形：</b><span id="extra_2">無</span>
                                    </div>
                                </td>
                                <td>
                                    <input type="button" class="btn btn-sm btn-outline-primary mb-1 w-100" id="edit_button2" value="編輯" onclick="edit_row('2')">
                                    <input type="button" class="btn btn-sm btn-success mb-1 w-100" id="save_button2" value="儲存" style="display:none" onclick="save_row('2')">
                                    <input type="button" class="btn btn-sm btn-outline-danger w-100" value="刪除" onclick="delete_row('2')">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 智慧型動態表單輸入區 -->
                <div class="card bg-light border-0 rounded-3 p-4">
                    <h6 class="fw-bold text-dark mb-3">➕ 登記新的聖徒追求計畫與生活實行</h6>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <input type="text" id="new_name" class="form-control form-control-sm" placeholder="聖徒姓名">
                        </div>
                        <div class="col-md-8">
                            <input type="text" id="new_country" class="form-control form-control-sm" placeholder="真理追求目標 ">
                        </div>
                        
                        <div class="col-12 mt-2">
                            <label class="form-label small fw-bold text-secondary mb-1">每週固定聚會參與：</label>
                            <div class="d-flex flex-wrap gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="add_pray" checked>
                                    <label class="form-check-label small" for="add_pray">週二晚上 20:00 禱告聚會</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="add_group" checked>
                                    <label class="form-check-label small" for="add_group">週五晚上 20:00 小排聚會</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="add_lord" checked>
                                    <label class="form-check-label small" for="add_lord">週日上午 09:30 主日聚會</label>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <select id="add_gospel" class="form-select form-select-sm" onchange="toggleGospel(this, 'add_gospel_time')">
                                <option value="有">有分別時間傳福音</option>
                                <option value="沒有">沒有分別時間</option>
                            </select>
                        </div>
                        <div class="col-md-8">
                            <input type="text" id="add_gospel_time" class="form-control form-control-sm" placeholder="傳福音時段 (例如：每週六下午兩點)" value="每週六下午兩點">
                        </div>

                        <div class="col-12">
                            <input type="text" id="add_extra" class="form-control form-control-sm" placeholder="額外分別的情形 (例如：每天晨興、家排成看望...)">
                        </div>

                        <div class="col-12 text-end">
                            <input type="button" class="btn btn-dark fw-bold btn-sm px-4 shadow-sm" value="新增紀錄" onclick="add_row()">
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div style="text-align:center; padding: 20px; color: #666; font-size: 0.9rem;">
        ※ 本頁面之召會生活動態追蹤大腦由 JavaScript 前端核心渲染驅動。
    </div>
       
    <!-- ====================================================== -->
    <!-- JavaScript 大腦（核心增刪改查完全封裝） -->
    <!-- ====================================================== -->
    <script>
        // ============ 登入 / 登出 ============
        function handleLogin() {
            const username = document.getElementById("login_username").value.trim();
            const password = document.getElementById("login_password").value;
            const errorBox = document.getElementById("login_error");
            errorBox.style.display = "none";

            if (!username || !password) {
                errorBox.textContent = "請輸入帳號與密碼";
                errorBox.style.display = "block";
                return;
            }
            if (password.length < 6) {
                errorBox.textContent = "密碼至少需要 6 個字元";
                errorBox.style.display = "block";
                return;
            }

            const email = username + FAKE_EMAIL_DOMAIN;
            document.getElementById("login_btn").disabled = true;

            auth.signInWithEmailAndPassword(email, password)
                .catch((err) => {
                    if (err.code === "auth/user-not-found" || err.code === "auth/invalid-credential") {
                        // 第一次使用，自動建立帳號
                        return auth.createUserWithEmailAndPassword(email, password);
                    }
                    throw err;
                })
                .catch((err) => {
                    errorBox.textContent = "登入失敗：" + (err.code === "auth/wrong-password" ? "密碼錯誤" : err.message);
                    errorBox.style.display = "block";
                })
                .finally(() => {
                    document.getElementById("login_btn").disabled = false;
                });
        }

        function handleLogout() {
            auth.signOut();
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById("login-container").style.display = "none";
                document.getElementById("app-container").style.display = "block";
                document.getElementById("current-user-label").textContent =
                    "登入身分：" + user.email.replace(FAKE_EMAIL_DOMAIN, "");
                loadData();
            } else {
                document.getElementById("login-container").style.display = "block";
                document.getElementById("app-container").style.display = "none";
            }
        });

        // ============ 雲端資料存取 ============
        function getUserDocRef() {
            const user = auth.currentUser;
            if (!user) return null;
            return db.collection("trackerData").doc(user.uid);
        }

        function serializeTable() {
            const rows = [];
            document.querySelectorAll("#X tbody tr").forEach((tr) => {
                const no = tr.id.replace("row", "");
                const name = document.getElementById("name_row" + no).textContent.trim();
                const goal = document.getElementById("country_row" + no).textContent.trim();
                const prayTag = document.getElementById("pray_tag" + no);
                const groupTag = document.getElementById("group_tag" + no);
                const lordTag = document.getElementById("lord_tag" + no);
                const pray = prayTag ? prayTag.textContent.includes("🙏") : false;
                const group = groupTag ? groupTag.textContent.includes("🏡") : false;
                const lord = lordTag ? lordTag.textContent.includes("🍞") : false;
                const gospelElem = document.getElementById("gospel_" + no);
                const gospelText = gospelElem ? gospelElem.textContent.trim() : "";
                const hasGospel = gospelText.includes("沒有") ? "沒有" : "有";
                const gospelTime = hasGospel === "有" ? gospelText.replace(/^有\s*\(/, "").replace(/\)$/, "") : "";
                const extraElem = document.getElementById("extra_" + no);
                const extra = extraElem ? extraElem.textContent.trim() : "";
                rows.push({ name, goal, pray, group, lord, gospel: hasGospel, gospelTime, extra });
            });
            return rows;
        }

        function buildRowHtml(no, d) {
            return `
                <tr id="row${no}">
                    <td id="name_row${no}" class="fw-bold">${escapeHtml(d.name)}</td>
                    <td id="country_row${no}">${escapeHtml(d.goal)}</td>
                    <td id="sex_row${no}" class="text-start p-3">
                        <div class="mb-1">
                            <span class="badge ${d.pray ? "bg-success" : "bg-secondary"} meeting-badge" id="pray_tag${no}">${d.pray ? "🙏 週二禱告" : "✕ 週二禱告"}</span>
                            <span class="badge ${d.group ? "bg-success" : "bg-secondary"} meeting-badge" id="group_tag${no}">${d.group ? "🏡 週五小排" : "✕ 週五小排"}</span>
                            <span class="badge ${d.lord ? "bg-success" : "bg-secondary"} meeting-badge" id="lord_tag${no}">${d.lord ? "🍞 主日聚會" : "✕ 主日聚會"}</span>
                        </div>
                        <div class="small text-muted mb-1">
                            📢 <b>傳福音：</b><span id="gospel_${no}" class="${d.gospel === "有" ? "text-primary fw-bold" : "text-danger"}">${d.gospel === "有" ? "有 (" + escapeHtml(d.gospelTime) + ")" : "沒有分別時間"}</span>
                        </div>
                        <div class="small text-muted">
                            ✨ <b>額外分別的情形：</b><span id="extra_${no}">${d.extra ? escapeHtml(d.extra) : "無"}</span>
                        </div>
                    </td>
                    <td>
                        <input type="button" class="btn btn-sm btn-outline-primary mb-1 w-100" id="edit_button${no}" value="編輯" onclick="edit_row('${no}')">
                        <input type="button" class="btn btn-sm btn-success mb-1 w-100" id="save_button${no}" value="儲存" style="display:none" onclick="save_row('${no}')">
                        <input type="button" class="btn btn-sm btn-outline-danger w-100" value="刪除" onclick="delete_row('${no}')">
                    </td>
                </tr>
            `;
        }

        function renderTable(rows) {
            const tbody = document.querySelector("#X tbody");
            tbody.innerHTML = "";
            rows.forEach((d, idx) => {
                tbody.insertAdjacentHTML("beforeend", buildRowHtml(idx + 1, d));
            });
        }

        function saveData() {
            const docRef = getUserDocRef();
            if (!docRef) return;
            docRef.set({ rows: serializeTable(), updatedAt: new Date().toISOString() })
                .catch((err) => console.error("儲存失敗：", err));
        }

        function loadData() {
            const docRef = getUserDocRef();
            if (!docRef) return;
            docRef.get().then((doc) => {
                if (doc.exists && Array.isArray(doc.data().rows) && doc.data().rows.length > 0) {
                    renderTable(doc.data().rows);
                } else {
                    // 這個帳號第一次使用，還沒有雲端資料，就用預設的示範資料，並立刻存一份上去
                    saveData();
                }
            }).catch((err) => console.error("讀取失敗：", err));
        }

        function toggleGospel(selectObj, targetId) {
            const target = document.getElementById(targetId);
            if (!target) return;
            if (selectObj.value === "有") {
                target.disabled = false;
                target.value = target.value || "每週六下午兩點";
            } else {
                target.disabled = true;
                target.value = "";
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function getNextRowNumber() {
            const existing = Array.from(document.querySelectorAll("tbody tr"))
                .map(tr => parseInt(tr.id.replace("row", ""), 10))
                .filter(n => !Number.isNaN(n))
                .sort((a, b) => a - b);

            let next = 1;
            while (existing.includes(next)) {
                next++;
            }
            return next;
        }

        function delete_row(no) {
            const row = document.getElementById("row" + no);
            if (row) row.remove();
            saveData();
        }

        function edit_row(no) {
            const nameCell = document.getElementById("name_row" + no);
            const countryCell = document.getElementById("country_row" + no);
            const sexCell = document.getElementById("sex_row" + no);

            const nameData = nameCell.textContent.trim();
            const countryData = countryCell.textContent.trim();
            const prayTag = document.getElementById("pray_tag" + no);
            const groupTag = document.getElementById("group_tag" + no);
            const lordTag = document.getElementById("lord_tag" + no);

            const p = prayTag ? prayTag.textContent.includes("🙏") : false;
            const g = groupTag ? groupTag.textContent.includes("🏡") : false;
            const l = lordTag ? lordTag.textContent.includes("🍞") : false;

            const gospelElem = document.getElementById("gospel_" + no);
            const gospelText = gospelElem ? gospelElem.textContent : "";
            const hasGospel = gospelText.includes("沒有") ? "沒有" : "有";
            const gospelTime = hasGospel === "有" ? gospelText.replace(/^有\s*\(/, "").replace(/\)$/, "") : "";

            const extraElem = document.getElementById("extra_" + no);
            const extraStr = extraElem ? extraElem.textContent : "";

            nameCell.innerHTML = `<input type='text' class='form-control form-control-sm' id='name_text${no}' value='${escapeHtml(nameData)}'>`;
            countryCell.innerHTML = `<input type='text' class='form-control form-control-sm' id='country_text${no}' value='${escapeHtml(countryData)}'>`;

            const editFormHtml = `
                <div class="p-2 border rounded bg-light text-start" style="font-size:0.85rem;" id="sex_edit_box${no}">
                    <div class="mb-1 fw-bold text-muted">聚會實行變更：</div>
                    <input type="checkbox" id="edit_pray${no}" ${p ? "checked" : ""}> 禱告
                    <input type="checkbox" id="edit_group${no}" ${g ? "checked" : ""} class="ms-2"> 小排
                    <input type="checkbox" id="edit_lord${no}" ${l ? "checked" : ""} class="ms-2"> 主日
                    <div class="mt-2">
                        <select id="edit_gospel_sel${no}" class="form-select form-select-sm d-inline-block w-auto me-1" onchange="toggleGospel(this, 'edit_gospel_time${no}')">
                            <option value="有" ${hasGospel === "有" ? "selected" : ""}>有福音</option>
                            <option value="沒有" ${hasGospel === "沒有" ? "selected" : ""}>無福音</option>
                        </select>
                        <input type="text" id="edit_gospel_time${no}" class="form-control form-control-sm d-inline-block w-50" value="${escapeHtml(gospelTime)}" ${hasGospel === "沒有" ? "disabled" : ""}>
                    </div>
                    <input type="text" id="edit_extra${no}" class="form-control form-control-sm mt-2" value="${escapeHtml(extraStr)}" placeholder="額外分別的情形">
                </div>
            `;
            sexCell.innerHTML = editFormHtml;
            document.getElementById("edit_button" + no).style.display = "none";
            document.getElementById("save_button" + no).style.display = "inline";
        }

        function save_row(no) {
            const nameCell = document.getElementById("name_row" + no);
            const countryCell = document.getElementById("country_row" + no);
            const sexCell = document.getElementById("sex_row" + no);

            const nameVal = document.getElementById("name_text" + no).value;
            const countryVal = document.getElementById("country_text" + no).value;

            nameCell.textContent = nameVal;
            countryCell.textContent = countryVal;

            const p = document.getElementById("edit_pray" + no).checked;
            const g = document.getElementById("edit_group" + no).checked;
            const l = document.getElementById("edit_lord" + no).checked;
            const gSel = document.getElementById("edit_gospel_sel" + no).value;
            const gTime = document.getElementById("edit_gospel_time" + no).value;
            const ext = document.getElementById("edit_extra" + no).value;

            const resultHtml = `
                <div class="mb-1">
                    <span class="badge ${p ? "bg-success" : "bg-secondary"} meeting-badge" id="pray_tag${no}">${p ? "🙏 週二禱告" : "✕ 週二禱告"}</span>
                    <span class="badge ${g ? "bg-success" : "bg-secondary"} meeting-badge" id="group_tag${no}">${g ? "🏡 週五小排" : "✕ 週五小排"}</span>
                    <span class="badge ${l ? "bg-success" : "bg-secondary"} meeting-badge" id="lord_tag${no}">${l ? "🍞 主日聚會" : "✕ 主日聚會"}</span>
                </div>
                <div class="small text-muted mb-1">
                    📢 <b>傳福音：</b><span id="gospel_${no}" class="${gSel === "有" ? "text-primary fw-bold" : "text-danger"}">${gSel === "有" ? "有 (" + gTime + ")" : "沒有分別時間"}</span>
                </div>
                <div class="small text-muted">
                    ✨ <b>額外分別的情形：</b><span id="extra_${no}">${ext ? ext : "無"}</span>
                </div>
            `;

            sexCell.innerHTML = resultHtml;
            document.getElementById("edit_button" + no).style.display = "inline";
            document.getElementById("save_button" + no).style.display = "none";
            saveData();
        }

        function add_row() {
            const newName = document.getElementById("new_name").value.trim();
            const newCountry = document.getElementById("new_country").value.trim();

            const p = document.getElementById("add_pray").checked;
            const g = document.getElementById("add_group").checked;
            const l = document.getElementById("add_lord").checked;
            const gSel = document.getElementById("add_gospel").value;
            const gTime = document.getElementById("add_gospel_time").value.trim();
            const ext = document.getElementById("add_extra").value.trim();

            if (!newName || !newCountry) {
                alert("請至少輸入聖徒姓名與真理追求目標！");
                return;
            }

            const table = document.getElementById("X");
            const tableLen = getNextRowNumber();

            const rowHtml = `
                <tr id="row${tableLen}">
                    <td id="name_row${tableLen}" class="fw-bold">${escapeHtml(newName)}</td>
                    <td id="country_row${tableLen}">${escapeHtml(newCountry)}</td>
                    <td id="sex_row${tableLen}" class="text-start p-3">
                        <div class="mb-1">
                            <span class="badge ${p ? "bg-success" : "bg-secondary"} meeting-badge" id="pray_tag${tableLen}">${p ? "🙏 週二禱告" : "✕ 週二禱告"}</span>
                            <span class="badge ${g ? "bg-success" : "bg-secondary"} meeting-badge" id="group_tag${tableLen}">${g ? "🏡 週五小排" : "✕ 週五小排"}</span>
                            <span class="badge ${l ? "bg-success" : "bg-secondary"} meeting-badge" id="lord_tag${tableLen}">${l ? "🍞 主日聚會" : "✕ 主日聚會"}</span>
                        </div>
                        <div class="small text-muted mb-1">
                            📢 <b>傳福音：</b><span id="gospel_${tableLen}" class="${gSel === "有" ? "text-primary fw-bold" : "text-danger"}">${gSel === "有" ? "有 (" + gTime + ")" : "沒有分別時間"}</span>
                        </div>
                        <div class="small text-muted">
                            ✨ <b>額外分別的情形：</b><span id="extra_${tableLen}">${ext ? ext : "無"}</span>
                        </div>
                    </td>
                    <td>
                        <input type="button" class="btn btn-sm btn-outline-primary mb-1 w-100" id="edit_button${tableLen}" value="編輯" onclick="edit_row('${tableLen}')">
                        <input type="button" class="btn btn-sm btn-success mb-1 w-100" id="save_button${tableLen}" value="儲存" style="display:none" onclick="save_row('${tableLen}')">
                        <input type="button" class="btn btn-sm btn-outline-danger w-100" value="刪除" onclick="delete_row('${tableLen}')">
                    </td>
                </tr>
            `;

            table.querySelector("tbody").insertAdjacentHTML("beforeend", rowHtml);

            document.getElementById("new_name").value = "";
            document.getElementById("new_country").value = "";
            document.getElementById("add_pray").checked = true;
            document.getElementById("add_group").checked = true;
            document.getElementById("add_lord").checked = true;
            document.getElementById("add_gospel").value = "有";
            document.getElementById("add_gospel_time").value = "每週六下午兩點";
            document.getElementById("add_gospel_time").disabled = false;
            document.getElementById("add_extra").value = "";
            saveData();
        }
    </script>
</body>
</html>
